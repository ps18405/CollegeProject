<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fb 0%, #e9ecef 100%);
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .edit-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .card-title {
            color: #667eea;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        .form-control,
        .form-select {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn {
            border-radius: 10px;
            font-weight: 600;
            padding: 12px 30px;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-success {
            background: linear-gradient(135deg, #1cc88a 0%, #0da76c 100%);
            border: none;
            flex: 1;
        }

        .btn-secondary {
            flex: 1;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .back-link {
            margin-bottom: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: #764ba2;
        }
    </style>
</head>

<body>

<div class="edit-container">
    <div class="back-link">
        <a href="/"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>

    <div class="card p-4">
        <h2 class="card-title"><i class="fas fa-edit"></i> Edit Expense</h2>

        <form method="POST" action="/update/{{ expense['id'] }}">

            <div class="form-group">
                <label><i class="fas fa-money-bill"></i> Amount</label>
                <input 
                    class="form-control" 
                    type="number" 
                    name="amount" 
                    value="{{ expense['amount'] }}" 
                    step="0.01"
                    required
                    min="0"
                >
            </div>

            <div class="form-group">
                <label><i class="fas fa-tag"></i> Category</label>
                <select class="form-select" name="category" required>
                    {% for cat in categories %}
                    <option value="{{ cat }}" {% if expense['category'] == cat %}selected{% endif %}>
                        {{ cat }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-align-left"></i> Description</label>
                <input 
                    class="form-control" 
                    type="text" 
                    name="description" 
                    value="{{ expense['description'] }}" 
                    required
                    minlength="3"
                >
            </div>

            <div class="form-group">
                <label><i class="fas fa-calendar"></i> Date</label>
                <input 
                    class="form-control" 
                    type="date" 
                    name="expense_date" 
                    value="{{ expense['expense_date'] }}" 
                    required
                >
            </div>

            <div class="form-group">
                <label><i class="fas fa-credit-card"></i> Payment Method</label>
                <select class="form-select" name="payment_method">
                    {% for method in payment_methods %}
                    <option value="{{ method }}" {% if expense['payment_method'] == method %}selected{% endif %}>
                        {{ method }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-check-circle"></i> Status</label>
                <select class="form-select" name="status">
                    <option value="paid" {% if expense['status'] == 'paid' %}selected{% endif %}>Paid</option>
                    <option value="pending" {% if expense['status'] == 'pending' %}selected{% endif %}>Pending</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-hashtag"></i> Tags (optional)</label>
                <input 
                    class="form-control" 
                    type="text" 
                    name="tags" 
                    value="{{ expense['tags'] or '' }}"
                    placeholder="e.g., urgent, important"
                >
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-success">
                    <i class="fas fa-save"></i> Update Expense
                </button>
                <a href="/" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
