<!DOCTYPE html>
<html>
<head>
    <title>Register - Expense Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .register-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 450px;
        }

        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-header h1 {
            color: #667eea;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .register-header p {
            color: #666;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            font-size: 1rem;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        .btn-register:hover {
            color: white;
            transform: translateY(-2px);
        }

        .alert {
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .login-link a {
            color: #667eea;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s;
        }

        .login-link a:hover {
            color: #764ba2;
        }

        .password-strength {
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .strength-meter {
            height: 5px;
            border-radius: 3px;
            background: #e0e0e0;
            margin-top: 5px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s;
        }
    </style>
</head>

<body>

<div class="register-container">
    <div class="register-header">
        <h1><i class="fas fa-chart-pie"></i></h1>
        <h1>Create Account</h1>
        <p>Join Expense Tracker today</p>
    </div>

    {% if errors %}
    {% for error in errors %}
    <div class="alert alert-danger alert-dismissible fade show">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
    {% endif %}

    <form method="POST" id="registerForm">
        <div class="form-group">
            <label><i class="fas fa-user"></i> Username</label>
            <input type="text" class="form-control" name="username" placeholder="Choose a username (min 3 chars)" 
                   required minlength="3">
            <small class="text-muted">Must be at least 3 characters</small>
        </div>

        <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email Address</label>
            <input type="email" class="form-control" name="email" placeholder="your@email.com" required>
            <small class="text-muted">We'll never share your email</small>
        </div>

        <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" class="form-control" id="password" name="password" 
                   placeholder="Create a strong password" required minlength="6">
            <div class="password-strength" id="passwordStrength"></div>
            <small class="text-muted">Min 6 characters, include a number</small>
        </div>

        <div class="form-group">
            <label><i class="fas fa-lock"></i> Confirm Password</label>
            <input type="password" class="form-control" id="confirmPassword" name="confirm_password" 
                   placeholder="Confirm your password" required>
        </div>

        <button type="submit" class="btn btn-register">
            <i class="fas fa-user-plus"></i> Create Account
        </button>
    </form>

    <div class="login-link">
        <p>Already have an account? <a href="/login">Login here</a></p>
    </div>
</div>

<script>
    // Password strength indicator
    document.getElementById('password').addEventListener('input', function() {
        const password = this.value;
        const strengthBar = document.getElementById('passwordStrength').querySelector('.strength-bar') || 
                           (() => {
                               const bar = document.createElement('div');
                               bar.className = 'strength-bar';
                               document.getElementById('passwordStrength').appendChild(bar);
                               return bar;
                           })();
        
        let strength = 0;
        if (password.length >= 6) strength += 25;
        if (/[0-9]/.test(password)) strength += 25;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 25;
        if (/[^a-zA-Z0-9]/.test(password)) strength += 25;

        strengthBar.style.width = strength + '%';
        strengthBar.style.backgroundColor = strength <= 25 ? '#e74a3b' : 
                                           strength <= 50 ? '#f6c23e' :
                                           strength <= 75 ? '#1cc88a' : '#1cc88a';
    });

    // Form validation
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        if (password !== confirmPassword) {
            e.preventDefault();
            alert('Passwords do not match!');
        }
    });
</script>

</body>
</html>
