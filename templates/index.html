<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #f5f7fb;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .navbar {
            border-radius: 0 0 15px 15px;
        }

        .btn {
            border-radius: 10px;
        }

        table {
            border-radius: 10px;
            overflow: hidden;
        }
    </style>
</head>

<body>

<!-- 🔵 NAVBAR -->
<nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand mb-0 h1">💸 Expense Tracker</span>
    <a href="/logout" class="btn btn-light btn-sm">Logout</a>
</nav>

<div class="container mt-4">

    <!-- 💰 TOTAL CARD -->
    <div class="card p-3 mb-4 text-center">
        <h5>Total Spending</h5>
        <h2 class="text-primary">₹ {{ total if total else 0 }}</h2>
    </div>

    <!-- ➕ ADD EXPENSE -->
    <div class="card p-4 mb-4">
        <h5 class="mb-3">Add Expense</h5>

        <form method="POST" action="/add">
            <div class="row g-2">
                <div class="col-md-3">
                    <input class="form-control" name="amount" placeholder="Amount" required>
                </div>
                <div class="col-md-3">
                    <input class="form-control" name="category" placeholder="Category" required>
                </div>
                <div class="col-md-4">
                    <input class="form-control" name="description" placeholder="Description" required>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100">Add</button>
                </div>
            </div>
        </form>
    </div>

    <!-- 📊 CHART -->
    <div class="card p-4 mb-4 text-center">
        <h5>Spending Insights</h5>
        <div style="width:300px; margin:auto;">
            <canvas id="chart"></canvas>
        </div>
    </div>

    <!-- 📋 TABLE -->
    <div class="card p-4">
        <h5 class="mb-3">All Expenses</h5>

        <div class="table-responsive">
            <table class="table align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Description</th>
                        <th class="text-end">Action</th>
                    </tr>
                </thead>

                <tbody>
                    {% for expense in expenses %}
                    <tr>
                        <td><strong>₹ {{ expense[2] }}</strong></td>
                        <td>{{ expense[3] }}</td>
                        <td>{{ expense[4] }}</td>
                        <td class="text-end">
                            <a class="btn btn-warning btn-sm" href="/edit/{{ expense[0] }}">Edit</a>
                            <a class="btn btn-danger btn-sm" href="/delete/{{ expense[0] }}">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>
    </div>

</div>

<!-- 📊 CHART SCRIPT -->
<script>
const data = {{ category_data | tojson }};
const labels = data.map(i => i[0]);
const values = data.map(i => i[1]);

new Chart(document.getElementById('chart'), {
    type: 'doughnut',
    data: {
        labels: labels,
        datasets: [{
            data: values,
            backgroundColor: ['#4e73df','#1cc88a','#36b9cc','#f6c23e','#e74a3b']
        }]
    }
});
</script>

</body>
</html>
